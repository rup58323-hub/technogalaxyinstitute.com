
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techno Galaxy Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
overflow:hidden;
}

.card{
width:90%;
max-width:900px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.2);
border-radius:30px;
padding:50px;
text-align:center;
color:white;
box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.logo{
font-size:70px;
margin-bottom:15px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:.9;
margin-bottom:35px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:15px 35px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:.3s;
text-decoration:none;
color:white;
}

.admin{
background:#2563eb;
}

.student{
background:#16a34a;
}

.btn:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.features{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.feature{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:15px;
}

.footer{
margin-top:30px;
opacity:.7;
font-size:14px;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">🎓</div>

<h1>Techno Galaxy IT Institute</h1>

<p>
Notes Management & Online Learning Portal
</p>

<div class="buttons">

<a href="admin.html" class="btn admin">
⚙ Admin Dashboard
</a>

<a href="student.html" class="btn student">
📚 Student Portal
</a>

</div>

<div class="features">

<div class="feature">
📖 Notes Download
</div>

<div class="feature">
🎥 Live Online Classes
</div>

<div class="feature">
💻 Web Development
</div>

<div class="feature">
🔒 Secure Dashboard
</div>

</div>

<div class="footer">
© 2026 Techno Galaxy IT Institute
</div>

</div>

</body>
</html>
